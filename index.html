<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">
    <title>آية اليوم - Orthodox</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/progressier.json"/>
    <script defer src="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/script.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #2c3e50; --gold: #c9a03d; }
        body { 
            font-family: 'Amiri', serif; 
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; color: white;
        }
        .card { 
            background: rgba(255,255,255,0.95); padding: 35px 25px; 
            border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            text-align: center; max-width: 450px; width: 100%; color: #333;
        }
        h1 { color: var(--primary); font-size: 1.8rem; margin-bottom: 5px; }
        .sub { color: #666; font-size: 0.9rem; margin-bottom: 20px; border-bottom: 1px solid #eee; display: inline-block; padding-bottom: 5px; }
        .verse-text { 
            font-size: 1.5rem; color: #222; margin: 20px 0; font-weight: bold; line-height: 1.6; 
            min-height: 100px; background: #fdfcf0; padding: 25px; border-radius: 20px; border: 1px solid #eee;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .verse-ref { color: var(--gold); font-size: 1.2rem; margin-bottom: 25px; font-weight: bold; }
        .time-input { 
            font-size: 1.3rem; padding: 12px; border: 2px solid var(--primary); border-radius: 50px; 
            width: 90%; margin: 15px 0; text-align: center; color: var(--primary); font-family: 'Amiri', serif;
        }
        .btn { 
            background: linear-gradient(135deg, var(--primary), #1a252f); color: white; border: none; 
            padding: 15px 25px; border-radius: 50px; cursor: pointer; width: 100%; font-size: 1.2rem; 
            font-family: 'Amiri', serif; transition: 0.3s; margin-top: 10px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        #status { color: #27ae60; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 50px; background: #e8f5e9; display: none; }
        #status.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <h1>📖 آية اليوم</h1>
    <div class="sub">الأرثوذكسية - Orthodox</div>
    
    <div id="verse-box">
        <div class="verse-text" id="v-text">جاري جلب كلمة الله...</div>
        <div class="verse-ref" id="v-ref"></div>
    </div>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    <p style="font-weight: bold;">حدد وقت التذكير اليومي (المنبه):</p>
    <input type="time" id="notify-time" class="time-input" value="08:00">
    <button class="btn" id="setupBtn">🔔 حفظ وتفعيل المنبه</button>
    <button class="btn btn-secondary" id="testBtn">✝ تجربة الإشعار الآن</button>
    <div id="status"></div>
</div>

<script>
    const fallbackVerses = [
        { text: "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.", ref: "فيلبي 4:13" },
        { text: "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ.", ref: "إشعياء 41:10" },
        { text: "الرَّبُّ رَاعِيَّ فَلاَ يُعْوِزُنِي شَيْءٌ.", ref: "مزمور 23:1" }
    ];

    async function fetchVerse() {
        try {
            const res = await fetch(`https://arabic-bible.onrender.com/api?book=${Math.floor(Math.random()*66)+1}&ch=1&ver=1`);
            const data = await res.json();
            return { text: data.verse, ref: data.bookName || "الكتاب المقدس" };
        } catch { return fallbackVerses[Math.floor(Math.random()*fallbackVerses.length)]; }
    }

    async function triggerNotification(title, bodyText) {
        const registration = await navigator.serviceWorker.ready;
        if (Notification.permission === "granted") {
            registration.showNotification(title, {
                body: bodyText,
                icon: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png",
                badge: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png",
                vibrate: [200, 100, 200],
                tag: 'daily-verse-alarm',
                renotify: true
            });
        }
    }

    async function saveSettings() {
        const time = document.getElementById('notify-time').value;
        const permission = await Notification.requestPermission();
        
        if (permission === "granted") {
            localStorage.setItem('verse_time', time);
            
            // ربط الوقت بـ Progressier (المنبه الحقيقي للسيرفر)
            if (window.progressier) {
                window.progressier.updateMetadata({ alarm_time: time });
            }

            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `✅ تم التفعيل! المنبه مضبوط على ${time}`;
            statusDiv.classList.add('show');
            
            // إشعار فوري للتأكيد
            triggerNotification("✅ منبه الآية نشط", `ستصلك الآية يومياً في تمام الساعة ${time}`);
            setTimeout(() => statusDiv.classList.remove('show'), 4000);
            
            startBackgroundCheck();
        } else {
            alert("يجب السماح بالإشعارات لعمل المنبه");
        }
    }

    let checkInterval = null;
    function startBackgroundCheck() {
        if (checkInterval) clearInterval(checkInterval);
        checkInterval = setInterval(async () => {
            const now = new Date();
            const currentTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            const savedTime = localStorage.getItem('verse_time');
            const lastDate = localStorage.getItem('last_notified_date');
            const today = now.toDateString();

            if (savedTime === currentTime && lastDate !== today) {
                const v = await fetchVerse();
                triggerNotification("📖 آية اليوم", v.text);
                localStorage.setItem('last_notified_date', today);
            }
        }, 30000); // يفحص كل 30 ثانية
    }

    document.getElementById('setupBtn').onclick = saveSettings;
    document.getElementById('testBtn').onclick = async () => {
        const v = await fetchVerse();
        triggerNotification("✝ تجربة المنبه", v.text);
    };

    window.onload = async () => {
        const v = await fetchVerse();
        document.getElementById('v-text').innerText = `"${v.text}"`;
        document.getElementById('v-ref').innerText = v.ref;
        
        const savedTime = localStorage.getItem('verse_time');
        if (savedTime) {
            document.getElementById('notify-time').value = savedTime;
            startBackgroundCheck();
        }
    };
</script>
</body>
</html>
