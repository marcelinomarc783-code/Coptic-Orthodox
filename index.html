<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">
    <title>آية اليوم - كتابك المقدس</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/progressier.json"/>
    <script defer src="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/script.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #2c3e50; --gold: #c9a03d; }
        body { 
            font-family: 'Amiri', serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .card { 
            background: rgba(255,255,255,0.95); padding: 35px 25px; 
            border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            text-align: center; max-width: 500px; width: 100%; 
        }
        h1 { color: var(--primary); font-size: 1.8rem; margin-bottom: 5px; }
        .sub { color: #666; font-size: 0.85rem; margin-bottom: 20px; border-bottom: 1px solid #eee; display: inline-block; padding-bottom: 5px; }
        .verse-text { 
            font-size: 1.6rem; color: #222; margin: 20px 0; font-weight: bold; line-height: 1.7; 
            min-height: 100px; background: #f8f9fa; padding: 20px; border-radius: 20px; border-right: 5px solid var(--gold);
        }
        .verse-ref { color: var(--gold); font-size: 1.1rem; margin-bottom: 20px; font-weight: bold; }
        .time-input { 
            font-size: 1.2rem; padding: 12px; border: 2px solid var(--primary); border-radius: 50px; 
            width: 85%; margin: 15px 0; text-align: center; color: var(--primary);
        }
        .btn { 
            background: linear-gradient(135deg, var(--primary), #1a252f); color: white; border: none; 
            padding: 14px 25px; border-radius: 50px; cursor: pointer; width: 100%; font-size: 1.1rem; 
            font-family: 'Amiri', serif; transition: 0.3s; margin-top: 5px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-top: 10px; }
        #status { color: #27ae60; margin-top: 15px; font-weight: bold; padding: 8px; border-radius: 50px; background: #e8f5e9; display: none; }
        #status.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        hr { margin: 20px 0; border: 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h1>📖 آية اليوم</h1>
    <div class="sub">كلمة الله لك كل يوم</div>
    
    <div id="verse-box">
        <div class="verse-text" id="v-text">جاري تحميل الآية...</div>
        <div class="verse-ref" id="v-ref"></div>
    </div>
    
    <hr>
    <p style="font-weight: bold; color: var(--primary);">⏰ وقت التذكير اليومي:</p>
    <input type="time" id="notify-time" class="time-input" value="08:00">
    <button class="btn" id="setupBtn">🔔 حـفـظ وتـفـعـيـل</button>
    <button class="btn btn-secondary" id="testBtn">✝ جرب التنبيه الآن</button>
    <div id="status"></div>
</div>

<script>
    const fallbackVerses = [
        { text: "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ. أَيَّدْتُكَ وَأَعَنْتُكَ.", ref: "إشعياء 41:10" },
        { text: "الرَّبُّ رَاعِيَّ فَلاَ يُعْوِزُنِي شَيْءٌ. فِي مَرَاعٍ خُضْرٍ يُرْبِضُنِي.", ref: "مزمور 23:1-2" },
        { text: "أَنَا هُوَ الطَّرِيقُ وَالْحَقُّ وَالْحَيَاةُ. لَيْسَ أَحَدٌ يَأْتِي إِلَى الآبِ إِلاَّ بِي.", ref: "يوحنا 14:6" }
    ];

    async function fetchVerse() {
        try {
            const res = await fetch(`https://arabic-bible.onrender.com/api?book=${Math.floor(Math.random()*66)+1}&ch=1&ver=1`);
            const data = await res.json();
            return { text: data.verse, ref: data.bookName || "الكتاب المقدس" };
        } catch { return fallbackVerses[Math.floor(Math.random()*fallbackVerses.length)]; }
    }

    async function showNativeNotification() {
        const verse = await fetchVerse();
        if (Notification.permission === "granted") {
            const reg = await navigator.serviceWorker.ready;
            reg.showNotification("📖 آية اليوم لك", {
                body: `"${verse.text}" - ${verse.ref}`,
                icon: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png",
                badge: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png",
                vibrate: [200, 100, 200],
                tag: 'verse-notif'
            });
            document.getElementById('v-text').innerText = `"${verse.text}"`;
            document.getElementById('v-ref').innerText = verse.ref;
        }
    }

    // إرسال البيانات لـ Progressier ليعمل الإشعار والتطبيق مغلق
    function syncWithProgressier(time) {
        if (window.progressier) {
            window.progressier.add({
                metadata: { preferredNotificationTime: time }
            });
        }
    }

    document.getElementById('setupBtn').onclick = async () => {
        const time = document.getElementById('notify-time').value;
        const permission = await Notification.requestPermission();
        
        if (permission === "granted") {
            localStorage.setItem('verse_time', time);
            syncWithProgressier(time);
            
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `✅ تم الحفظ! ستصلك الآية يومياً الساعة ${time}`;
            statusDiv.classList.add('show');
            setTimeout(() => statusDiv.classList.remove('show'), 5000);
            
            // إرسال إشعار فوري للتأكد من العمل
            showNativeNotification();
        } else {
            alert("يرجى السماح بالإشعارات أولاً");
        }
    };

    document.getElementById('testBtn').onclick = showNativeNotification;

    // تشغيل الآية عند الفتح
    window.onload = async () => {
        const v = await fetchVerse();
        document.getElementById('v-text').innerText = `"${v.text}"`;
        document.getElementById('v-ref').innerText = v.ref;
        
        const savedTime = localStorage.getItem('verse_time');
        if (savedTime) document.getElementById('notify-time').value = savedTime;
    };
</script>
</body>
</html>
