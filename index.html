<div class="card">

<div class="verse-text" id="v-text">جاري التحميل...</div>

<script>
// fallback
const fallbackVerses = [
{text:"لا تخف لأني معك",ref:"إشعياء 41:10"},
{text:"الرب راعي فلا يعوزني شيء",ref:"مزمور 23"},
{text:"أنا هو الطريق والحق والحياة",ref:"يوحنا 14:6"}
];

// API
async function fetchVerseFromAPI(){
try{
const r=await fetch("https://arabic-bible.onrender.com/api?book=1&ch=1&ver=1");
const d=await r.json();
return {text:d.verse,ref:d.bookName};
}catch{
return fallbackVerses[Math.floor(Math.random()*fallbackVerses.length)];
}
}

// تحميل الآية + تخزينها
async function loadVerse(){
const today=new Date().toDateString();
const savedDate=localStorage.getItem("verse_date");

let verse;

if(savedDate===today){
verse={
text:localStorage.getItem("verse_text"),
ref:localStorage.getItem("verse_ref")
};
}else{
verse=await fetchVerseFromAPI();

localStorage.setItem("verse_text",verse.text);
localStorage.setItem("verse_ref",verse.ref);
localStorage.setItem("verse_date",today);
}

// عرض
document.getElementById("v-text").innerText=verse.text;
document.getElementById("v-ref").innerText=verse.ref;

// 🔥 مهم ل Progressier
localStorage.setItem("daily_verse",verse.text+" - "+verse.ref);
}
