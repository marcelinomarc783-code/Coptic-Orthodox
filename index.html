<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2c3e50">
    <title>آية اليوم - كتابك المقدس</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/progressier.json"/>
    <script defer src="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/script.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #2c3e50; --gold: #c9a03d; }
        body { 
            font-family: 'Amiri', serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        .card { 
            background: rgba(255,255,255,0.95); 
            padding: 35px 25px; 
            border-radius: 35px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            text-align: center; 
            max-width: 500px; 
            width: 100%; 
        }
        h1 { color: var(--primary); font-size: 1.8rem; margin-bottom: 5px; }
        .sub { color: #666; font-size: 0.85rem; margin-bottom: 20px; border-bottom: 1px solid #eee; display: inline-block; padding-bottom: 5px; }
        .verse-text { 
            font-size: 1.6rem; color: #222; margin: 20px 0; font-weight: bold; line-height: 1.7; 
            min-height: 100px; background: #f8f9fa; padding: 20px; border-radius: 20px; border-right: 5px solid var(--gold);
        }
        .verse-ref { color: var(--gold); font-size: 1.1rem; margin-bottom: 20px; font-weight: bold; }
        .time-input { 
            font-size: 1.2rem; padding: 12px; border: 2px solid var(--primary); border-radius: 50px; 
            width: 85%; margin: 15px 0; text-align: center; color: var(--primary); font-family: 'Amiri', serif;
        }
        .btn { 
            background: linear-gradient(135deg, var(--primary), #1a252f); color: white; border: none; 
            padding: 14px 25px; border-radius: 50px; cursor: pointer; width: 100%; font-size: 1.1rem; 
            font-family: 'Amiri', serif; transition: all 0.3s ease; margin-top: 5px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-top: 10px; }
        #status { color: #27ae60; margin-top: 15px; font-weight: bold; padding: 8px; border-radius: 50px; background: #e8f5e9; display: none; }
        #status.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        hr { margin: 20px 0; border: 0; border-top: 1px solid #eee; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--gold); border-radius: 50%; border-top-color: transparent; animation: spin 0.8s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) { .card { padding: 25px 20px; } .verse-text { font-size: 1.3rem; padding: 15px; } h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>

<div class="card">
    <h1>📖 آية اليوم</h1>
    <div class="sub">كلمة الله لك كل يوم</div>
    
    <div id="verse-box">
        <div class="verse-text" id="v-text"><span class="loading"></span> جاري تحميل الآية...</div>
        <div class="verse-ref" id="v-ref"></div>
    </div>
    
    <hr>
    <p style="font-weight: bold; color: var(--primary);">⏰ حدد وقت التذكير اليومي:</p>
    <input type="time" id="notify-time" class="time-input" value="08:00">
    <button class="btn" id="setupBtn">🔔 فعّل الإشعارات اليومية</button>
    <button class="btn btn-secondary" id="testBtn">✝ جرب التنبيه الآن</button>
    <div id="status"></div>
</div>

<script>
    const fallbackVerses = [
        { text: "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ. أَيَّدْتُكَ وَأَعَنْتُكَ.", ref: "إشعياء 41:10" },
        { text: "الرَّبُّ رَاعِيَّ فَلاَ يُعْوِزُنِي شَيْءٌ. فِي مَرَاعٍ خُضْرٍ يُرْبِضُنِي.", ref: "مزمور 23:1-2" },
        { text: "أَنَا هُوَ الطَّرِيقُ وَالْحَقُّ وَالْحَيَاةُ. لَيْسَ أَحَدٌ يَأْتِي إِلَى الآبِ إِلاَّ بِي.", ref: "يوحنا 14:6" },
        { text: "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.", ref: "فيلبي 4:13" },
        { text: "أَحْبَبْتُكَ حُبًّا أَبَدِيًّا. لِذَلِكَ جَذَبْتُكِ بِالرَّحْمَةِ.", ref: "إرميا 31:3" },
        { text: "تَعَالَوْا إِلَيَّ يَا جَمِيعَ الْمُتْعَبِينَ وَالثَّقِيلِي الأَحْمَالِ وَأَنَا أُرِيحُكُمْ.", ref: "متى 11:28" }
    ];

    function vibrate() { if (navigator.vibrate) navigator.vibrate([300, 100, 300]); }

    async function fetchVerseFromAPI() {
        const books = Array.from({length: 66}, (_, i) => i + 1); // الكتاب المقدس 66 سفر
        const randomBook = books[Math.floor(Math.random() * books.length)];
        const randomChapter = Math.floor(Math.random() * 20) + 1;
        const randomVerse = Math.floor(Math.random() * 10) + 1;
        try {
            const response = await fetch(`https://arabic-bible.onrender.com/api?book=${randomBook}&ch=${randomChapter}&ver=${randomVerse}`);
            if (!response.ok) throw new Error('API failed');
            const data = await response.json();
            if (data && data.verse) return { text: data.verse, ref: `${data.bookName || 'الكتاب المقدس'} ${randomChapter}:${randomVerse}` };
            throw new Error('No verse data');
        } catch(error) { 
            return fallbackVerses[Math.floor(Math.random() * fallbackVerses.length)]; 
        }
    }

    async function loadVerse() {
        const verse = await fetchVerseFromAPI();
        document.getElementById('v-text').innerHTML = `"${verse.text}"`;
        document.getElementById('v-ref').innerHTML = verse.ref;
    }

    // الدالة المعدلة لإظهار الإشعار بشكل صحيح على الموبايل
    async function sendNotification(title, bodyText) {
        if (!("Notification" in window)) return;

        if (Notification.permission === "granted") {
            try {
                // محاولة الإرسال عبر الـ Service Worker (أفضل للموبايل)
                const registration = await navigator.serviceWorker.ready;
                registration.showNotification(title || "📖 آية اليوم لك", {
                    body: bodyText,
                    icon: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png",
                    badge: "https://cdn-icons-png.flaticon.com/512/2903/2903510.png",
                    vibrate: [200, 100, 200],
                    requireInteraction: true
                });
            } catch (e) {
                // fallback في حال فشل الـ Service Worker
                new Notification(title, { body: bodyText });
            }
        }
    }

    async function handleDailyTrigger() {
        const verse = await fetchVerseFromAPI();
        await sendNotification("📖 آية اليوم لك", `"${verse.text.substring(0, 100)}..." - ${verse.ref}`);
        document.getElementById('v-text').innerHTML = `"${verse.text}"`;
        document.getElementById('v-ref').innerHTML = verse.ref;
        vibrate();
    }

    async function setupReminder() {
        const selectedTime = document.getElementById('notify-time').value;
        if (!selectedTime) { alert("اختر وقت التذكير أولاً"); return; }
        
        const permission = await Notification.requestPermission();
        if (permission === "granted") {
            localStorage.setItem('verse_time', selectedTime);
            showActivationMessage(selectedTime);
            // إرسال إشعار فوري للتأكيد
            sendNotification("✅ تم تفعيل التذكير", `ستصلك آية يومياً الساعة ${selectedTime}`);
        } else {
            alert("لازم تسمح بالإشعارات من إعدادات المتصفح");
        }
    }

    function showActivationMessage(time) {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = `✅ تم التفعيل! هتجيلك آية يومياً الساعة ${time}`;
        statusDiv.classList.add('show');
        vibrate();
        setTimeout(() => statusDiv.classList.remove('show'), 4000);
        startChecking();
    }

    let lastNotifiedDate = "";
    let checkInterval = null;

    function startChecking() {
        if (checkInterval) clearInterval(checkInterval);
        checkInterval = setInterval(async () => {
            const now = new Date();
            const currentTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            const currentDate = now.toDateString();
            const targetTime = localStorage.getItem('verse_time');

            if (targetTime && currentTime === targetTime && lastNotifiedDate !== currentDate) {
                await handleDailyTrigger();
                lastNotifiedDate = currentDate;
            }
        }, 30000); // يفحص كل 30 ثانية
    }

    // ربط الأزرار
    document.getElementById('setupBtn').onclick = setupReminder;
    document.getElementById('testBtn').onclick = async () => {
        const permission = await Notification.requestPermission();
        if (permission === "granted") {
            await handleDailyTrigger();
        } else {
            alert("الرجاء تفعيل الإشعارات");
        }
    };

    window.onload = async () => {
        await loadVerse();
        const savedTime = localStorage.getItem('verse_time');
        if (savedTime) {
            document.getElementById('notify-time').value = savedTime;
            startChecking();
        }
    };
</script>
</body>
</html>
