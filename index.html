<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آية اليوم</title>

<link rel="manifest" href="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/progressier.json"/>
<script defer src="https://progressier.app/wMM8TeMVeUSYMWPJ4k2i/script.js"></script>

<style>
body {
    font-family: 'Amiri', serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;justify-content:center;align-items:center;
    min-height:100vh;margin:0;
}
.card{
    background:#fff;padding:30px;border-radius:25px;
    width:90%;max-width:400px;text-align:center;
}
.verse-text{font-size:1.4rem;margin:20px 0;}
.verse-ref{color:#c9a03d;}
.btn{padding:12px;border:none;border-radius:20px;
background:#2c3e50;color:#fff;width:100%;margin-top:10px;}
input{padding:10px;width:100%;margin-top:10px;border-radius:15px;border:1px solid #ccc;}
</style>
</head>

<body>

<div class="card">
<h2>📖 آية اليوم</h2>

<div id="v-text">جاري التحميل...</div>
<div id="v-ref"></div>

<hr>

<input type="time" id="notify-time" value="08:00">
<button class="btn" onclick="saveTime()">🔔 حفظ وقت الإشعار</button>
<button class="btn" onclick="testNotification()">✝ تجربة إشعار</button>

</div>

<script>

const fallbackVerses = [
{text:"لا تخف لأني معك",ref:"إشعياء 41:10"},
{text:"الرب راعي فلا يعوزني شيء",ref:"مزمور 23"},
{text:"أنا هو الطريق والحق والحياة",ref:"يوحنا 14:6"}
];

// API عشوائي
async function fetchVerseFromAPI(){
try{
const book=Math.floor(Math.random()*66)+1;
const ch=Math.floor(Math.random()*20)+1;
const ver=Math.floor(Math.random()*20)+1;

const r=await fetch(`https://arabic-bible.onrender.com/api?book=${book}&ch=${ch}&ver=${ver}`);
const d=await r.json();

if(!d.verse) throw "error";

return {
text:d.verse,
ref:(d.bookName||"الكتاب")+" "+ch+":"+ver
};

}catch{
return fallbackVerses[Math.floor(Math.random()*fallbackVerses.length)];
}
}

// تحميل الآية
async function loadVerse(){
const today=new Date().toDateString();
const savedDate=localStorage.getItem("verse_date");

let verse;

if(savedDate===today){
verse={
text:localStorage.getItem("verse_text"),
ref:localStorage.getItem("verse_ref")
};
}else{
verse=await fetchVerseFromAPI();

localStorage.setItem("verse_text",verse.text);
localStorage.setItem("verse_ref",verse.ref);
localStorage.setItem("verse_date",today);
}

// عرض
document.getElementById("v-text").innerText=verse.text;
document.getElementById("v-ref").innerText=verse.ref;

// مهم للإشعارات
localStorage.setItem("daily_verse",verse.text+" - "+verse.ref);
}

// حفظ الوقت
function saveTime(){
const t=document.getElementById("notify-time").value;
localStorage.setItem("notify_time",t);
alert("تم حفظ الوقت 👍");
}

// تجربة إشعار
async function testNotification(){
const verse=localStorage.getItem("daily_verse")||"افتح التطبيق الأول";

if(Notification.permission==="granted"){
new Notification("📖 آية اليوم",{body:verse});
}else{
await Notification.requestPermission();
}
}

window.onload=loadVerse;

</script>

</body>
</html>
